version: "3.9"
services:
  db:
    image: postgres:15-alpine
    container_name: agenda-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agenda_ai
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: agenda-backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:3000"
    command: sh -c "npm run prisma:migrate && npm run start:prod"
volumes:
  db_data:
