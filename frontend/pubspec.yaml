name: agendaai
description: Plataforma de diretório de serviços — Agenda AI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^14.0.0

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP e rede
  dio: ^5.4.3+1

  # Armazenamento seguro de tokens
  flutter_secure_storage: ^9.2.2

  # Fontes
  google_fonts: ^6.2.1

  # Imagens com cache
  cached_network_image: ^3.3.1

  # Shimmer (skeleton loaders)
  shimmer: ^3.0.0

  # Autenticação social
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Modelos imutáveis + JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Carrossel de banners
  smooth_page_indicator: ^1.2.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Geração de código
  build_runner: ^2.4.9
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
